backend:
  name: github
  repo: Yathindra-mestha/Campus_connect # Adjust mapping to the correct repo owner/name
  branch: main

# These settings map where media is uploaded in the repository and how it's referenced in the content
media_folder: "public/images/projects"
public_folder: "/images/projects"

# Collections define the structure of the different content types
collections:
  - name: "projects"
    label: "Projects"
    folder: "src/content/students/Vinayakahr10/projects" # Initially scoped to one student for structure mapping
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Demo URL", name: "demo_url", widget: "string", required: false }
      - { label: "Repo URL", name: "github_url", widget: "string", required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, required: false }
      - { label: "Category / Branch", name: "branch", widget: "select", options: ["CSE", "ECE", "Mechanical", "Civil", "AI/ML", "General"] }
      - { label: "Tags", name: "tags", widget: "list", default: [] }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "events"
    label: "Events"
    folder: "src/content/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "string", hint: "e.g. March 15-17, 2026" }
      - { label: "Time", name: "time", widget: "string", hint: "e.g. 9:00 AM - 5:00 PM or Completed" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Category", name: "category", widget: "string", hint: "e.g. Hackathon, Workshop" }
      - { label: "Current Participants", name: "participants", widget: "number", default: 0 }
      - { label: "Max Participants", name: "maxParticipants", widget: "number", default: 100 }
      - { label: "Cover Image", name: "image", widget: "image", required: true }
      - { label: "Short Description", name: "description", widget: "text" }
      - { label: "Winners (Optional)", name: "winners", widget: "list", required: false, hint: "List of winner names or teams if completed" }
      - { label: "Full Details", name: "body", widget: "markdown", required: false }
